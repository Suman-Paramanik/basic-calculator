<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- History Panel -->
        <div class="history-panel hidden" id="historyPanel">
            <div class="history-header">
                <h3>History</h3>
                <button id="clearHistoryBtn" title="Clear History"><i class="fas fa-trash"></i></button>
            </div>
            <div class="history-list" id="historyList">
                <!-- History items will be injected here -->
            </div>
        </div>

        <!-- Calculator -->
        <div class="calculator">
            <!-- Display Area -->
            <div class="display">
                <div class="display-header">
                    <button id="toggleHistoryBtn" title="Toggle History"><i class="fas fa-history"></i></button>
                </div>
                <div class="previous-operand" id="previousOperand"></div>
                <div class="current-operand" id="currentOperand">0</div>
                <div class="display-footer">
                    <button id="copyBtn" title="Copy Result"><i class="fas fa-copy"></i></button>
                    <span id="copyMsg" class="copy-msg">Copied!</span>
                </div>
            </div>

            <!-- Keypad -->
            <div class="keypad">
                <!-- Row 1 -->
                <button class="btn fn" data-action="deg-rad" id="degRadBtn">RAD</button>
                <button class="btn fn" data-action="sin">sin</button>
                <button class="btn fn" data-action="cos">cos</button>
                <button class="btn fn" data-action="tan">tan</button>
                <button class="btn action highlight" data-action="clear">C</button>
                <button class="btn action highlight" data-action="all-clear">AC</button>
                <button class="btn action highlight" data-action="backspace"><i class="fas fa-backspace"></i></button>

                <!-- Row 2 -->
                <button class="btn fn" data-action="asin">sin⁻¹</button>
                <button class="btn fn" data-action="acos">cos⁻¹</button>
                <button class="btn fn" data-action="atan">tan⁻¹</button>
                <button class="btn fn" data-action="open-paren">(</button>
                <button class="btn fn" data-action="close-paren">)</button>
                <button class="btn fn" data-action="percent">%</button>
                <button class="btn op" data-action="divide">÷</button>

                <!-- Row 3 -->
                <button class="btn fn" data-action="log">log</button>
                <button class="btn fn" data-action="ln">ln</button>
                <button class="btn fn" data-action="pow">xʸ</button>
                <button class="btn num" data-number="7">7</button>
                <button class="btn num" data-number="8">8</button>
                <button class="btn num" data-number="9">9</button>
                <button class="btn op" data-action="multiply">×</button>

                <!-- Row 4 -->
                <button class="btn fn" data-action="sqrt">√</button>
                <button class="btn fn" data-action="square">x²</button>
                <button class="btn fn" data-action="factorial">x!</button>
                <button class="btn num" data-number="4">4</button>
                <button class="btn num" data-number="5">5</button>
                <button class="btn num" data-number="6">6</button>
                <button class="btn op" data-action="subtract">-</button>

                <!-- Row 5 -->
                <button class="btn fn" data-action="abs">|x|</button>
                <button class="btn fn" data-action="inv">1/x</button>
                <button class="btn fn" data-action="pi">π</button>
                <button class="btn num" data-number="1">1</button>
                <button class="btn num" data-number="2">2</button>
                <button class="btn num" data-number="3">3</button>
                <button class="btn op" data-action="add">+</button>

                <!-- Row 6 -->
                <button class="btn fn" data-action="e">e</button>
                <button class="btn fn" data-action="exp">EXP</button>
                <button class="btn fn" data-action="10pow">10ˣ</button>
                <button class="btn num double-span" data-number="0">0</button>
                <button class="btn num" data-action="decimal">.</button>
                <button class="btn equals" data-action="equals">=</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
